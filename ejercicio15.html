<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulación del DOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #lista {
            list-style-type: none;
            padding: 0;
        }

        .elemento {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background-color: #f0f0f0;
            margin-bottom: 5px;
            border-radius: 4px;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">

        <h1 class="mb-4 text-center text-primary">Agregar y Eliminar Elementos</h1>

        <div class="d-flex gap-2 mb-4">
            <input type="text" id="nuevoElemento" class="form-control" placeholder="Escribe algo">

            <button id="agregarBtn" class="btn btn-primary">Agregar</button>
        </div>

        <ul id="lista" class="list-group"></ul>
    </div>

    <script src="js/ejercicio15.js"></script>
</body>

</html>
