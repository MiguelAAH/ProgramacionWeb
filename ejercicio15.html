<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de estudiantes</title>
    <link rel="stylesheet" href="css/ejercicio15.css">
</head>

<body>
    <div class="contenedor-calculadora">
        <h1>Agrega estudiantes y sus calificaciones </h1>
        <label> Nombre </label>
        <input type="text" id="num1" placeholder="Ingrese el nombre del estudiante" required
            pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+">
        <br>
        <label> Calificacion </label>
        <input type="number" id="num2" placeholder="Ingresa la calificacion del estudiante" min="1" max="10">
        <br>
        <button class="boton-convertir" onclick="agregar()">Agregar</button>
        <br>

        <ul id="listaEstudiantes"></ul>

        <br>
        <button class="boton-calcular" onclick="calcular()">Calcular</button>
        <br>
        <label> Promedio de califiaciones </label>
        <input type="number" id="num3" readonly name="num3">
        <br>
        <label> Nombre del estudiante con la calificacion mas alta </label>
        <input type="text" id="num4" readonly name="num4">
        <br>
        <label> Nombre del estudiante con la calificacion mas baja </label>
        <input type="text" id="num5" readonly name="num5">
        <br>


    </div>
    <script src="js/ejercicio15.js"></script>
</body>

</html>
